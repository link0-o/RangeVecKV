name: ci

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:
    inputs:
      production_docker:
        description: "Build the production Docker image with vcpkg backends"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  local-build-test:
    name: Local fallback build and tests
    runs-on: ubuntu-24.04

    steps:
      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          docker system prune -af || true
          df -h

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential \
            ca-certificates \
            cmake \
            curl \
            ninja-build \
            nlohmann-json3-dev \
            pkg-config \
            protobuf-compiler \
            libprotobuf-dev

      - name: Configure
        run: cmake -S . -B build/ci -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo

      - name: Build
        run: cmake --build build/ci --parallel

      - name: Test
        run: ctest --test-dir build/ci --output-on-failure

      - name: Install tree
        run: cmake --install build/ci --prefix "$PWD/dist/install"

      - name: Upload install artifact
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: rangeveckv-install
          path: dist/install/**

  package:
    name: Package fallback build
    runs-on: ubuntu-24.04
    needs: local-build-test
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          docker system prune -af || true
          df -h

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential \
            ca-certificates \
            cmake \
            ninja-build \
            nlohmann-json3-dev \
            pkg-config \
            protobuf-compiler \
            libprotobuf-dev

      - name: Configure package build
        run: cmake -S . -B build/package -G Ninja -DCMAKE_BUILD_TYPE=Release -DKVAI_ENABLE_PACKAGING=ON

      - name: Build
        run: cmake --build build/package --parallel

      - name: Test
        run: ctest --test-dir build/package --output-on-failure

      - name: Package
        run: cpack --config build/package/CPackConfig.cmake

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: rangeveckv-package
          path: rangeveckv-*.tar.gz

  docker-production:
    name: Production Docker build
    runs-on: ubuntu-24.04
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.production_docker == 'true'

    steps:
      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          docker system prune -af || true
          df -h

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: rangeveckv:ci
          build-contexts: |
            vcpkg_binary_cache=./docker/empty-vcpkg-cache

  release:
    name: GitHub release
    runs-on: ubuntu-24.04
    needs:
      - package
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: rangeveckv-package
          path: dist/release

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/release/*.tar.gz
