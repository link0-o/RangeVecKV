name: ci

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:
    inputs:
      production_docker:
        description: "Build the production Docker image with vcpkg backends"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  local-build-test:
    name: Local fallback build and tests
    runs-on: ubuntu-24.04

    steps:
      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          docker system prune -af || true
          df -h

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential \
            ca-certificates \
            cmake \
            curl \
            ninja-build \
            nlohmann-json3-dev \
            pkg-config \
            protobuf-compiler \
            libprotobuf-dev

      - name: Configure
        run: cmake -S . -B build/ci -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo

      - name: Build
        run: cmake --build build/ci --parallel

      - name: Test
        run: ctest --test-dir build/ci --output-on-failure

      - name: Install tree
        run: cmake --install build/ci --prefix "$PWD/dist/install"

      - name: Upload install artifact
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: rangeveckv-install
          path: dist/install/**

  docker-smoke:
    name: Docker compose smoke
    runs-on: ubuntu-24.04
    needs: local-build-test

    steps:
      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          docker system prune -af || true
          df -h

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare smoke environment
        run: |
          printf '%s\n' \
            'KVAI_API_KEY=ci-smoke-secret' \
            'KVAI_DISCOVERY_BACKEND=etcd' \
            'KVAI_ETCD_ENDPOINTS=http://etcd:2379' \
            'KVAI_ADVERTISE_HOST=rangeveckv' \
            'KVAI_NODE_WEIGHT=100' \
            'KVAI_NODE_ZONE=ci' \
            'KVAI_DATA_MIGRATION_ENABLED=false' \
            'KVAI_MIGRATION_DELETE_DELAY_MS=300000' \
            'KVAI_CLUSTER_SLOT_COUNT=4096' \
            'KVAI_CLUSTER_NODES=node-local@127.0.0.1:8080' \
            'KVAI_TLS_MODE=disabled' \
            'KVAI_AI_BACKEND=deterministic' \
            'KVAI_MODEL_PATH=/opt/rangeveckv/models/chinese-clip-vit-base-patch16/model_quantized.onnx' \
            'KVAI_TOKENIZER_PATH=/opt/rangeveckv/models/chinese-clip-vit-base-patch16/vocab.txt' \
            > .env
          mkdir -p data logs models images docker/empty-vcpkg-cache

      - name: Build fallback Docker image
        env:
          KVAI_DOCKER_OPTIONAL_BACKENDS: "OFF"
        run: docker compose build rangeveckv

      - name: Start stack
        env:
          KVAI_DOCKER_OPTIONAL_BACKENDS: "OFF"
        run: docker compose up -d etcd rangeveckv

      - name: Wait for health
        run: |
          for attempt in $(seq 1 90); do
            status="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' rangeveckv 2>/dev/null || true)"
            if [ "$status" = "healthy" ]; then
              exit 0
            fi
            if [ "$status" = "unhealthy" ] || [ "$status" = "exited" ] || [ "$status" = "dead" ]; then
              docker compose logs --tail=200 rangeveckv
              exit 1
            fi
            sleep 2
          done
          docker compose logs --tail=200 rangeveckv
          exit 1

      - name: HTTP smoke
        env:
          KVAI_API_KEY: ci-smoke-secret
        run: ./scripts/http_smoke.sh http://127.0.0.1:8080

      - name: Compose logs on failure
        if: failure()
        run: docker compose logs --tail=300

      - name: Stop stack
        if: always()
        run: docker compose down -v

  package:
    name: Package fallback build
    runs-on: ubuntu-24.04
    needs: local-build-test
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          docker system prune -af || true
          df -h

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential \
            ca-certificates \
            cmake \
            ninja-build \
            nlohmann-json3-dev \
            pkg-config \
            protobuf-compiler \
            libprotobuf-dev

      - name: Configure package build
        run: cmake -S . -B build/package -G Ninja -DCMAKE_BUILD_TYPE=Release -DKVAI_ENABLE_PACKAGING=ON

      - name: Build
        run: cmake --build build/package --parallel

      - name: Test
        run: ctest --test-dir build/package --output-on-failure

      - name: Package
        run: cpack --config build/package/CPackConfig.cmake

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: rangeveckv-package
          path: rangeveckv-*.tar.gz

  docker-production:
    name: Production Docker build
    runs-on: ubuntu-24.04
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.production_docker == 'true'

    steps:
      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          docker system prune -af || true
          df -h

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare Docker build context
        run: mkdir -p docker/empty-vcpkg-cache

      - name: Build production image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: rangeveckv:ci
          build-contexts: |
            vcpkg_binary_cache=./docker/empty-vcpkg-cache

  release:
    name: GitHub release
    runs-on: ubuntu-24.04
    needs:
      - package
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: rangeveckv-package
          path: dist/release

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/release/*.tar.gz
