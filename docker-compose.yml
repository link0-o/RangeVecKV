services:
  rangeveckv:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DEBIAN_MIRROR: ${DEBIAN_MIRROR:-http://mirrors.tuna.tsinghua.edu.cn/debian}
        DEBIAN_SECURITY_MIRROR: ${DEBIAN_SECURITY_MIRROR:-http://mirrors.tuna.tsinghua.edu.cn/debian-security}
        KVAI_DOCKER_OPTIONAL_BACKENDS: ${KVAI_DOCKER_OPTIONAL_BACKENDS:-ON}
      additional_contexts:
        vcpkg_binary_cache: ${VCPKG_BINARY_CACHE:-./docker/empty-vcpkg-cache}
    image: rangeveckv:local
    container_name: rangeveckv
    env_file:
      - .env
    environment:
      KVAI_API_KEY: ${KVAI_API_KEY:-change-me}
      KVAI_DISCOVERY_BACKEND: ${KVAI_DISCOVERY_BACKEND:-etcd}
      KVAI_ETCD_ENDPOINTS: ${KVAI_ETCD_ENDPOINTS:-http://etcd:2379}
      KVAI_ADVERTISE_HOST: ${KVAI_ADVERTISE_HOST:-rangeveckv}
      KVAI_NODE_WEIGHT: ${KVAI_NODE_WEIGHT:-100}
      KVAI_NODE_ZONE: ${KVAI_NODE_ZONE:-default}
      KVAI_DATA_MIGRATION_ENABLED: ${KVAI_DATA_MIGRATION_ENABLED:-false}
      KVAI_MIGRATION_DELETE_DELAY_MS: ${KVAI_MIGRATION_DELETE_DELAY_MS:-300000}
      KVAI_CLUSTER_SLOT_COUNT: ${KVAI_CLUSTER_SLOT_COUNT:-4096}
      KVAI_CLUSTER_NODES: ${KVAI_CLUSTER_NODES:-node-local@127.0.0.1:8080}
      KVAI_TLS_MODE: ${KVAI_TLS_MODE:-disabled}
      KVAI_AI_BACKEND: ${KVAI_AI_BACKEND:-deterministic}
      KVAI_MODEL_PATH: ${KVAI_MODEL_PATH:-/opt/rangeveckv/models/chinese-clip-vit-base-patch16/model_quantized.onnx}
      KVAI_TOKENIZER_PATH: ${KVAI_TOKENIZER_PATH:-/opt/rangeveckv/models/chinese-clip-vit-base-patch16/vocab.txt}
    command: ["--config", "/opt/rangeveckv/share/rangeveckv/config/server.docker.yaml", "--serve"]
    ports:
      - "8080:8080"
    volumes:
      - ./data:/opt/rangeveckv/data
      - ./logs:/opt/rangeveckv/logs
      - ./models:/opt/rangeveckv/models:ro
      - ./images:/opt/rangeveckv/images:ro
      - ./config:/opt/rangeveckv/share/rangeveckv/config
      - ./docs:/opt/rangeveckv/share/rangeveckv/docs
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      etcd:
        condition: service_healthy
    restart: unless-stopped

  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    container_name: rangeveckv-etcd
    environment:
      ETCD_NAME: node1
      ETCD_DATA_DIR: /etcd-data
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_ADVERTISE_CLIENT_URLS: http://etcd:2379
      ETCD_LISTEN_PEER_URLS: http://0.0.0.0:2380
      ETCD_INITIAL_ADVERTISE_PEER_URLS: http://etcd:2380
      ETCD_INITIAL_CLUSTER: node1=http://etcd:2380
      ETCD_INITIAL_CLUSTER_STATE: new
      ETCD_INITIAL_CLUSTER_TOKEN: rangeveckv-cluster
    ports:
      - "2379:2379"
    volumes:
      - etcd-data:/etcd-data
    healthcheck:
      test: ["CMD", "etcdctl", "--endpoints=http://127.0.0.1:2379", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

volumes:
  etcd-data:
