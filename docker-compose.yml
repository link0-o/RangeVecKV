services:
  rangeveckv:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DEBIAN_MIRROR: ${DEBIAN_MIRROR:-http://mirrors.tuna.tsinghua.edu.cn/debian}
        DEBIAN_SECURITY_MIRROR: ${DEBIAN_SECURITY_MIRROR:-http://mirrors.tuna.tsinghua.edu.cn/debian-security}
      additional_contexts:
        vcpkg_binary_cache: ${VCPKG_BINARY_CACHE:-./docker/empty-vcpkg-cache}
    image: rangeveckv:local
    container_name: rangeveckv
    env_file:
      - .env
    command: ["--config", "/opt/rangeveckv/share/rangeveckv/config/server.prod.yaml", "--serve"]
    ports:
      - "8080:8080"
    volumes:
      - ./data:/opt/rangeveckv/data
      - ./models:/opt/rangeveckv/models:ro
      - ./images:/opt/rangeveckv/images:ro
      - ./config:/opt/rangeveckv/share/rangeveckv/config
      - ./docs:/opt/rangeveckv/share/rangeveckv/docs
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      etcd:
        condition: service_healthy
    restart: unless-stopped

  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    container_name: rangeveckv-etcd
    environment:
      ETCD_NAME: node1
      ETCD_DATA_DIR: /etcd-data
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_ADVERTISE_CLIENT_URLS: http://etcd:2379
      ETCD_LISTEN_PEER_URLS: http://0.0.0.0:2380
      ETCD_INITIAL_ADVERTISE_PEER_URLS: http://etcd:2380
      ETCD_INITIAL_CLUSTER: node1=http://etcd:2380
      ETCD_INITIAL_CLUSTER_STATE: new
      ETCD_INITIAL_CLUSTER_TOKEN: rangeveckv-cluster
    ports:
      - "2379:2379"
    volumes:
      - etcd-data:/etcd-data
    healthcheck:
      test: ["CMD", "etcdctl", "--endpoints=http://127.0.0.1:2379", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

volumes:
  etcd-data:
