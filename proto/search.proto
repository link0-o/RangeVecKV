syntax = "proto3";

package kvai.v1;

option cc_generic_services = true;

message SearchFilter {
  string field = 1;
  string value = 2;
}

message SemanticSearchRequest {
  string trace_id = 1;
  string query = 2;
  uint32 top_k = 3;
  repeated SearchFilter filters = 4;
  string collection = 5;
}

message SemanticSearchResponse {
  string trace_id = 1;
  repeated SearchHit hits = 2;
  bool degraded = 3;
  string message = 4;
}

message SearchHit {
  string key = 1;
  string title = 2;
  string snippet = 3;
  double score = 4;
  map<string, string> metadata = 5;
}

message DocumentRecord {
  string collection = 1;
  string key = 2;
  string title = 3;
  string body = 4;
  map<string, string> metadata = 5;
  uint64 version = 6;
  int64 updated_at_unix_ms = 7;
  string mutation_id = 8;
}

enum WalOperation {
  WAL_OPERATION_UNSPECIFIED = 0;
  WAL_OPERATION_PUT = 1;
  WAL_OPERATION_DELETE = 2;
}

message WalEntry {
  WalOperation operation = 1;
  DocumentRecord record = 2;
  string collection = 3;
  string key = 4;
}

message VectorEntry {
  DocumentRecord record = 1;
  repeated float vector = 2;
}

message HealthCheckRequest {
  string trace_id = 1;
}

message HealthCheckResponse {
  string trace_id = 1;
  string status = 2;
  string version = 3;
  repeated string warnings = 4;
  map<string, string> details = 5;
}

message RequestContext {
  string trace_id = 1;
  string api_key = 2;
  string authorization = 3;
}

message KvPutRequest {
  RequestContext context = 1;
  DocumentRecord record = 2;
}

message KvBatchPutRequest {
  RequestContext context = 1;
  repeated DocumentRecord records = 2;
}

message DocumentUpsertRequest {
  RequestContext context = 1;
  DocumentRecord record = 2;
}

message KvWriteResponse {
  string trace_id = 1;
  string message = 2;
  uint32 record_count = 3;
}

// Generic request for HTTP-only endpoints that use controller directly
message HttpRequest {
}

// Generic response for HTTP-only endpoints that write directly to controller
message HttpResponse {
}

service SearchService {
  rpc SemanticSearch(SemanticSearchRequest) returns (SemanticSearchResponse);
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
}

// GatewayService handles all HTTP REST endpoints
service GatewayService {
  // GET/POST /v1/search
  rpc Search(HttpRequest) returns (HttpResponse);
  // GET /v1/router
  rpc Router(HttpRequest) returns (HttpResponse);
  // GET/POST/PUT/DELETE /v1/kv
  rpc Kv(HttpRequest) returns (HttpResponse);
  // POST /v1/documents
  rpc UpsertDocument(HttpRequest) returns (HttpResponse);
  // DELETE /v1/documents
  rpc DeleteDocument(HttpRequest) returns (HttpResponse);
  // POST /internal/migration/records
  rpc MigrateRecord(HttpRequest) returns (HttpResponse);
  // GET /healthz
  rpc Healthz(HttpRequest) returns (HttpResponse);
  // GET /metrics
  rpc Metrics(HttpRequest) returns (HttpResponse);
  // GET /openapi.yaml
  rpc OpenApi(HttpRequest) returns (HttpResponse);
}

service KvWriteService {
  rpc PutKv(KvPutRequest) returns (KvWriteResponse);
  rpc BatchPutKv(KvBatchPutRequest) returns (KvWriteResponse);
  rpc UpsertDocument(DocumentUpsertRequest) returns (KvWriteResponse);
}
