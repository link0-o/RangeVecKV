server:
  host: 127.0.0.1
  port: 8080
  worker_threads: 4
  graceful_shutdown_timeout_ms: 5000

gateway:
  rate_limit_per_second: 200
  kv_batch_max_records: 1000
  openapi_path: ./docs/openapi.yaml
  require_api_key: false
  api_key:

ai:
  timeout_ms: 25
  backend: auto
  model_path: ./models/clip.onnx
  embedding_dimensions: 32

search:
  max_top_k: 20
  backend: auto
  index_path: ./data/kvai.index
  vector_index_outbox_path: ./data/vector_index_outbox.wal

storage:
  default_collection: documents
  backend: auto
  read_only_mode: false
  enable_demo_data: true
  wal_path: ./data/kvai.wal
  snapshot_path: ./data/kvai.snapshot
  db_path: ./data/rocksdb
  rocksdb_max_background_jobs: 8
  rocksdb_write_buffer_size_mb: 128
  rocksdb_max_write_buffer_number: 6
  rocksdb_target_file_size_mb: 128
  rocksdb_bytes_per_sync: 1048576
  rocksdb_wal_bytes_per_sync: 1048576
  rocksdb_enable_pipelined_write: true

cluster:
  discovery_backend: static
  node_id: node-local
  node_weight: 100
  node_zone: default
  replication_factor: 1
  data_migration_enabled: false
  migration_delete_delay_ms: 300000
  migration_batch_size: 100
  migration_max_retries: 5
  migration_task_wal_path: ./data/migration_tasks.wal
  slot_count: 4096
  nodes: node-local@127.0.0.1:8080
  etcd_endpoints: http://127.0.0.1:2379
  etcd_prefix: /rangeveckv/nodes/
  etcd_lease_ttl_s: 10

security:
  tls_mode: disabled

logging:
  level: info
  file_path: ""
  file_max_size_mb: 10
  file_max_files: 3
