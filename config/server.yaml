server.host: 127.0.0.1
server.port: 8080
server.worker_threads: 4
server.graceful_shutdown_timeout_ms: 5000
gateway.rate_limit_per_second: 200
gateway.openapi_path: ./docs/openapi.yaml
gateway.require_api_key: false
gateway.api_key:
search.max_top_k: 20
search.backend: brute_force
ai.timeout_ms: 25
ai.backend: deterministic
ai.model_path: ./models/clip.onnx
ai.embedding_dimensions: 32
storage.default_collection: documents
storage.backend: wal
storage.read_only_mode: false
storage.enable_demo_data: true
storage.wal_path: ./data/kvai.wal
storage.snapshot_path: ./data/kvai.snapshot
storage.db_path: ./data/rocksdb
search.index_path: ./data/kvai.index
cluster.discovery_backend: static
cluster.node_id: node-local
cluster.replication_factor: 1
cluster.nodes: node-local@127.0.0.1:8080
security.tls_mode: disabled
log.level: info