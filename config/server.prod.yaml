server:
  host: 0.0.0.0
  port: 8080
  worker_threads: 8
  graceful_shutdown_timeout_ms: 8000

gateway:
  rate_limit_per_second: 1000
  openapi_path: /opt/rangeveckv/share/rangeveckv/docs/openapi.yaml
  require_api_key: true
  api_key: ${KVAI_API_KEY}

ai:
  timeout_ms: 2000
  backend: ${KVAI_AI_BACKEND}
  model_path: ${KVAI_MODEL_PATH}
  tokenizer_path: ${KVAI_TOKENIZER_PATH}
  max_tokens: 52
  embedding_dimensions: 512

search:
  max_top_k: 50
  backend: auto
  index_path: /opt/rangeveckv/data/kvai-cnclip.index
  vector_index_outbox_path: /opt/rangeveckv/data/vector_index_outbox.wal

storage:
  default_collection: documents
  backend: auto
  read_only_mode: false
  enable_demo_data: false
  wal_path: /opt/rangeveckv/data/kvai.wal
  snapshot_path: /opt/rangeveckv/data/kvai.snapshot
  db_path: /opt/rangeveckv/data/rocksdb

cluster:
  discovery_backend: ${KVAI_DISCOVERY_BACKEND}
  node_id: node-local
  advertise_host: ${KVAI_ADVERTISE_HOST}
  node_weight: ${KVAI_NODE_WEIGHT}
  node_zone: ${KVAI_NODE_ZONE}
  replication_factor: 1
  data_migration_enabled: ${KVAI_DATA_MIGRATION_ENABLED}
  migration_delete_delay_ms: ${KVAI_MIGRATION_DELETE_DELAY_MS}
  migration_batch_size: 100
  migration_max_retries: 5
  migration_task_wal_path: /opt/rangeveckv/data/migration_tasks.wal
  slot_count: ${KVAI_CLUSTER_SLOT_COUNT}
  nodes: ${KVAI_CLUSTER_NODES}
  etcd_endpoints: ${KVAI_ETCD_ENDPOINTS}
  etcd_prefix: /rangeveckv/nodes/
  etcd_lease_ttl_s: 10

security:
  tls_mode: ${KVAI_TLS_MODE}

logging:
  level: info
  file_path: /opt/rangeveckv/logs/rangeveckv.log
  file_max_size_mb: 10
  file_max_files: 3
