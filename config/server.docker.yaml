server.host: 0.0.0.0
server.port: 8080
server.worker_threads: 8
server.graceful_shutdown_timeout_ms: 8000

gateway.rate_limit_per_second: 1000
gateway.openapi_path: /opt/rangeveckv/share/rangeveckv/docs/openapi.yaml
gateway.require_api_key: true
gateway.api_key: ${KVAI_API_KEY}

ai.timeout_ms: 2000
ai.backend: ${KVAI_AI_BACKEND}
ai.model_path: ${KVAI_MODEL_PATH}
ai.tokenizer_path: ${KVAI_TOKENIZER_PATH}
ai.max_tokens: 52
ai.embedding_dimensions: 512

search.max_top_k: 50
search.backend: auto
search.index_path: /opt/rangeveckv/data/kvai-cnclip.index
search.vector_index_outbox_path: /opt/rangeveckv/data/vector_index_outbox.wal

storage.default_collection: documents
storage.backend: auto
storage.read_only_mode: false
storage.enable_demo_data: false
storage.wal_path: /opt/rangeveckv/data/kvai.wal
storage.snapshot_path: /opt/rangeveckv/data/kvai.snapshot
storage.db_path: /opt/rangeveckv/data/rocksdb

cluster.discovery_backend: ${KVAI_DISCOVERY_BACKEND}
cluster.node_id: node-local
cluster.advertise_host: ${KVAI_ADVERTISE_HOST}
cluster.node_weight: ${KVAI_NODE_WEIGHT}
cluster.node_zone: ${KVAI_NODE_ZONE}
cluster.replication_factor: 1
cluster.data_migration_enabled: ${KVAI_DATA_MIGRATION_ENABLED}
cluster.migration_delete_delay_ms: ${KVAI_MIGRATION_DELETE_DELAY_MS}
cluster.migration_batch_size: 100
cluster.migration_max_retries: 5
cluster.migration_task_wal_path: /opt/rangeveckv/data/migration_tasks.wal
cluster.slot_count: ${KVAI_CLUSTER_SLOT_COUNT}
cluster.nodes: ${KVAI_CLUSTER_NODES}
cluster.etcd_endpoints: ${KVAI_ETCD_ENDPOINTS}
cluster.etcd_prefix: /rangeveckv/nodes/
cluster.etcd_lease_ttl_s: 10

security.tls_mode: ${KVAI_TLS_MODE}

logging.level: info
logging.file_path: /opt/rangeveckv/logs/rangeveckv.log
logging.file_max_size_mb: 10
logging.file_max_files: 3
