openapi: 3.0.3
info:
  title: RangeVecKV Gateway API
  version: 0.1.0
  description: HTTP gateway for semantic search, pure KV compatibility APIs, health probes and metrics. Production write clients should prefer the typed Protobuf BRPC KvWriteService defined in proto/search.proto; that RPC surface is not represented by this OpenAPI document.
servers:
  - url: http://127.0.0.1:8080
paths:
  /healthz:
    get:
      summary: Liveness and readiness health check
      responses:
        '200':
          description: Service is ready
  /metrics:
    get:
      summary: Prometheus metrics endpoint
      responses:
        '200':
          description: Metrics payload
        '401':
          description: Missing or invalid API key
  /openapi.yaml:
    get:
      summary: OpenAPI document
      responses:
        '200':
          description: YAML OpenAPI spec
  /v1/router:
    get:
      summary: Resolve fixed slot and owner node for a collection/key
      parameters:
        - in: query
          name: collection
          schema:
            type: string
        - in: query
          name: key
          schema:
            type: string
      responses:
        '200':
          description: Route resolution result
        '401':
          description: Missing or invalid API key
  /v1/documents:
    post:
      summary: Upsert a document into KV and vector index
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                collection:
                  type: string
                key:
                  type: string
                title:
                  type: string
                body:
                  type: string
                metadata:
                  type: object
                  additionalProperties:
                    type: string
      responses:
        '200':
          description: Document accepted
        '401':
          description: Missing or invalid API key
        '503':
          description: Routed to a remote node or service unavailable
    delete:
      summary: Delete a document from KV and vector index
      parameters:
        - in: query
          name: collection
          schema:
            type: string
        - in: query
          name: key
          schema:
            type: string
            required: true
      responses:
        '200':
          description: Document deleted
        '401':
          description: Missing or invalid API key
        '503':
          description: Routed to a remote node or service unavailable
  /v1/kv:
    get:
      summary: Pure KV lookup or range scan without embedding or vector index access
      parameters:
        - in: query
          name: collection
          schema:
            type: string
        - in: query
          name: key
          schema:
            type: string
          description: When provided, returns exactly one record by key.
        - in: query
          name: begin_key
          schema:
            type: string
          description: Range scan lower bound used when key is omitted.
        - in: query
          name: end_key
          schema:
            type: string
          description: Range scan exclusive upper bound used when key is omitted.
        - in: query
          name: limit
          schema:
            type: integer
          description: Range result limit, capped by the server at 1000.
      responses:
        '200':
          description: KV record or range result
        '400':
          description: Invalid key or request
        '401':
          description: Missing or invalid API key
        '404':
          description: KV record not found
        '503':
          description: Routed to a remote node or service unavailable
    post:
      summary: Store a pure KV record without embedding or vector index update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                collection:
                  type: string
                key:
                  type: string
                value:
                  type: string
                  description: Alias stored as the record body.
                title:
                  type: string
                body:
                  type: string
                metadata:
                  type: object
                  additionalProperties:
                    type: string
      responses:
        '200':
          description: KV record stored
        '400':
          description: Missing key or invalid request
        '401':
          description: Missing or invalid API key
        '503':
          description: Routed to a remote node or service unavailable
    put:
      summary: Store a pure KV record without embedding or vector index update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                collection:
                  type: string
                key:
                  type: string
                value:
                  type: string
                title:
                  type: string
                body:
                  type: string
                metadata:
                  type: object
                  additionalProperties:
                    type: string
      responses:
        '200':
          description: KV record stored
        '400':
          description: Missing key or invalid request
        '401':
          description: Missing or invalid API key
        '503':
          description: Routed to a remote node or service unavailable
    delete:
      summary: Delete a pure KV record without vector index update
      parameters:
        - in: query
          name: collection
          schema:
            type: string
        - in: query
          name: key
          schema:
            type: string
            required: true
      responses:
        '200':
          description: KV record deleted
        '400':
          description: Missing key or invalid request
        '401':
          description: Missing or invalid API key
        '503':
          description: Routed to a remote node or service unavailable
  /v1/kv/batch:
    post:
      summary: Store multiple pure KV records without embedding or vector index updates
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - records
              properties:
                records:
                  type: array
                  items:
                    type: object
                    properties:
                      collection:
                        type: string
                      key:
                        type: string
                      value:
                        type: string
                        description: Alias stored as the record body.
                      title:
                        type: string
                      body:
                        type: string
                      metadata:
                        type: object
                        additionalProperties:
                          type: string
                      version:
                        type: integer
                      mutation_id:
                        type: string
      responses:
        '200':
          description: KV batch stored
        '400':
          description: Empty batch, duplicate key, oversized batch or invalid request
        '401':
          description: Missing or invalid API key
        '503':
          description: Routed to a remote node or service unavailable
  /v1/search:
    get:
      summary: Semantic search with query parameters
      parameters:
        - in: query
          name: q
          schema:
            type: string
        - in: query
          name: image_path
          schema:
            type: string
          description: Local JPEG/PNG path mounted into the service container for image vector search
        - in: query
          name: collection
          schema:
            type: string
        - in: query
          name: top_k
          schema:
            type: integer
        - in: query
          name: filter.domain
          schema:
            type: string
      responses:
        '200':
          description: Search result
        '401':
          description: Missing or invalid API key
        '503':
          description: Search temporarily unavailable
    post:
      summary: Semantic search with JSON body
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type: string
                image_path:
                  type: string
                  description: Local JPEG/PNG path mounted into the service container for image vector search
                image_reference:
                  type: string
                  description: Alias for image_path
                collection:
                  type: string
                top_k:
                  type: integer
                filters:
                  type: object
                  additionalProperties:
                    type: string
      responses:
        '200':
          description: Search result
        '401':
          description: Missing or invalid API key
